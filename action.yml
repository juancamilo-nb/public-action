name: "Trigger Private Workflow"
description: "Calls a private workflow in another repo"

inputs:
  username:
    required: true
  image:
    required: true

runs:
  using: "composite"
  steps:
    - name: Trigger private workflow
      shell: bash
      run: |
        curl -X POST \
          -H "Authorization: Bearer $PRIVATE_TOKEN" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/TU-ORG/TU-REPO/actions/workflows/private.yml/dispatches \
          -d '{
            "ref": "main",
            "inputs": {
              "username": "${{ inputs.username }}",
              "image": "${{ inputs.image }}"
            }
          }'
      env:
        PRIVATE_TOKEN: ${{ secrets.PRIVATE_TOKEN }}

