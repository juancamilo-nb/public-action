name: public

on:
  workflow_dispatch:
    inputs:
      username:
        required: true
        type: string
      image:
        required: true
        type: string

jobs:
  trigger:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger private workflow
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.PRIVATE_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/juancamilo-nb/private-action/actions/workflows/private.yml/dispatches \
            -d '{
              "ref": "master",
              "inputs": {
                "username": "${{ github.event.inputs.username }}",
                "image": "${{ github.event.inputs.image }}"
              }
            }'
